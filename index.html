<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Crescent Walk — Sales Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#e2e8f0;font-family:system-ui,sans-serif;padding:24px;min-height:100vh;}
h1{font-size:26px;font-weight:800;letter-spacing:-1px;}
.sub{font-size:13px;color:#94a3b8;font-weight:400;margin-left:10px;}
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;}
.kpi{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px 18px;flex:1 1 130px;}
.kpi-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;}
.kpi-value{font-size:19px;font-weight:800;}
.kpi-sub{font-size:10px;color:#94a3b8;margin-top:2px;}
.tabs{display:flex;gap:6px;overflow-x:auto;margin:20px 0;padding-bottom:4px;}
.tab{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#1e293b;color:#94a3b8;white-space:nowrap;}
.tab.active{background:#00d4aa;color:#0d1117;}
.grid2{display:grid;grid-template-columns:220px 1fr;gap:16px;margin-bottom:16px;}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:18px;}
.section-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;margin-bottom:10px;}
.rev-value{font-size:24px;font-weight:800;color:#00d4aa;line-height:1.2;}
.mom{font-size:13px;font-weight:700;margin-top:8px;}
.top-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:0;}
.top-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;position:relative;flex:1;min-width:0;}
.top-icon{font-size:20px;margin-bottom:8px;}
.top-type{font-size:16px;font-weight:800;margin-bottom:4px;}
.top-val{font-size:13px;font-weight:600;}
.expand-panel{background:#1e293b;border-radius:12px;padding:18px;margin-top:8px;margin-bottom:8px;}
.summary-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.toggle-group{display:flex;gap:4px;}
.toggle-btn{padding:4px 12px;border-radius:14px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:#1e293b;color:#94a3b8;}
.toggle-btn.active{background:#00d4aa;color:#0d1117;}
.pt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.pt-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;cursor:pointer;}
.pt-name{font-size:14px;font-weight:800;color:#00d4aa;margin-bottom:12px;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#94a3b8;}
.stat-value{font-size:11px;font-weight:700;margin-top:2px;}
.pie-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pie-wrap{text-align:center;}
.pie-title{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#94a3b8;margin-bottom:6px;}
.legend{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;justify-content:center;}
.legend-item{font-size:9px;font-weight:600;}
.pt-breakdown{background:#162032;border-radius:0 0 12px 12px;padding:16px;margin-top:0;}
.col-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.col-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.bar-row{margin-bottom:10px;}
.bar-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:11px;gap:8px;}
.bar-track{background:#0d1117;border-radius:4px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.footer{text-align:center;font-size:11px;color:#94a3b8;margin-top:24px;padding-bottom:24px;}
::-webkit-scrollbar{height:4px;background:#1e293b;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
@media(max-width:768px){
  body{padding:14px;}
  h1{font-size:20px;}
  .sub{display:block;margin-left:0;margin-top:4px;}
  .kpi{flex:1 1 calc(50% - 8px);padding:10px 14px;}
  .kpi-value{font-size:15px;}
  .grid2{grid-template-columns:1fr;}
  .top-row{flex-direction:column;}
  .pt-grid{grid-template-columns:1fr;}
  .card{padding:14px;}
  .rev-value{font-size:20px;}
  .summary-header{flex-direction:column;align-items:flex-start;}
  .col-pair{grid-template-columns:1fr;}
}
@media(max-width:400px){.kpi{flex:1 1 100%;}}
</style>
</head>

    var yy=PT+(H-PT-PB)*s/4;
    var v=Math.round(maxV*(1-s/4));
    grid+="<line x1='"+PL+"' y1='"+yy+"' x2='"+svgW+"' y2='"+yy+"' stroke='"+BORDER+"' stroke-width='0.5'/>";
    grid+="<text x='"+(PL-3)+"' y='"+(yy+3)+"' text-anchor='end' font-size='7' fill='"+MUTED+"'>"+(yFmt?yFmt(v):v)+"</text>";
  }
  pmData.forEach(function(d,i){
    var val=accessor(d);
    var h=Math.max((H-PT-PB)*val/maxV,val>0?2:0);
    var x=PL+i*(bW+4);
    bars+="<rect x='"+x+"' y='"+(H-PB-h)+"' width='"+bW+"' height='"+h+"' fill='"+color+"' opacity='0.85' rx='2'/>";
    if(val>0)bars+="<text x='"+(x+bW/2)+"' y='"+(H-PB-h-3)+"' text-anchor='middle' font-size='7' fill='"+color+"'>"+(yFmt?yFmt(val):val)+"</text>";
    labels+="<text x='"+(x+bW/2)+"' y='"+(H-PB+10)+"' text-anchor='middle' font-size='7' fill='"+MUTED+"'>"+fmtM(d.month)+"</text>";
  });
  document.getElementById(containerId).innerHTML="<div style='overflow-x:auto'><svg viewBox='0 0 "+svgW+" "+H+"' style='width:100%;min-width:"+svgW+"px;height:"+H+"px;overflow:visible'>"+grid+bars+labels+"</svg></div>";
}

function buildKpis(){
  var kpi=D.headerKpis;
  var items=[
    {l:"Total Released",v:kpi.totalReleased.toLocaleString(),c:TEXT},
    {l:"Total Sold",v:kpi.totalSold.toLocaleString(),c:TEAL},
    {l:"On Hold",v:kpi.totalHold.toLocaleString(),c:SLATE},
    {l:"Absorption",v:kpi.overallAbsorption+"%",c:TEAL},
    {l:"Total Revenue",v:fmt(kpi.totalRevenue),c:AMBER},
    {l:"Total Committed",v:fmt(kpi.totalCommitted),c:"#f97316",sub:"incl. booked"}
  ];
  document.getElementById("kpiRow").innerHTML=items.map(function(k){
    return "<div class='kpi'><div class='kpi-label'>"+k.l+"</div><div class='kpi-value' style='color:"+k.c+"'>"+k.v+"</div>"+(k.sub?"<div class='kpi-sub'>"+k.sub+"</div>":"")+"</div>";
  }).join("");
}

function buildTabs(){
  var container=document.getElementById("monthTabs");
  container.innerHTML="";
  D.months.forEach(function(m){
    var btn=document.createElement("button");
    btn.className="tab"+(m===sel?" active":"");
    btn.textContent=fmtM(m);
    btn.addEventListener("click",function(){selectMonth(m);});
    container.appendChild(btn);
  });
}

function drawTrend(){
  var vals=D.trendData.map(function(d){return d.revenue;});
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),range=max-min||1;
  var W=600,H=90,PAD=10;
  function px(i){return PAD+(i/(vals.length-1))*(W-PAD*2);}
  function py(v){return H-PAD-(v-min)/range*(H-PAD*2);}
  var pts=vals.map(function(v,i){return px(i)+","+py(v);}).join(" ");
  var selIdx=D.months.indexOf(sel);
  var dots=vals.map(function(v,i){
    var r=i===selIdx?6:2.5,op=i===selIdx?1:0.4;
    var stroke=i===selIdx?" stroke='"+BG+"' stroke-width='2'":"";
    return "<circle cx='"+px(i)+"' cy='"+py(v)+"' r='"+r+"' fill='"+TEAL+"' opacity='"+op+"'"+stroke+"/>";
  }).join("");
  var labels=D.trendData.map(function(d,i){
    return i%3===0?"<text x='"+px(i)+"' y='103' text-anchor='middle' font-size='8' fill='#64748b'>"+fmtM(d.month)+"</text>":"";
  }).join("");
  document.getElementById("trendSvg").innerHTML="<polyline points='"+pts+"' fill='none' stroke='"+TEAL+"' stroke-width='2'/>"+dots+labels;
}

function drawBar(){
  var bd=D.byMonth[sel].metrics.barData;
  var maxR=0;
  bd.forEach(function(d){if(d.revenue>maxR)maxR=d.revenue;});
  if(!maxR)maxR=1;
  document.getElementById("barChart").innerHTML=bd.map(function(d){
    var w=Math.max(d.revenue/maxR*100,1);
    return "<div class='bar-row'><div class='bar-label-row'><span style='color:"+TEXT+";font-weight:500'>"+d.type+"</span><span style='color:"+MUTED+";font-weight:600;white-space:nowrap'>"+fmtS(d.revenue)+" <span style='font-size:10px;color:#64748b'>("+d.units+" units)</span></span></div><div class='bar-track'><div class='bar-fill' style='width:"+w+"%;background:"+TEAL+"'></div></div></div>";
  }).join("");
}

function updateMonthly(){
  var md=D.byMonth[sel],mx=md.metrics,mom=md.momPct;
  document.getElementById("revValue").textContent=fmt(md.revenue);
  var momEl=document.getElementById("momVal");
  if(mom===null){momEl.textContent="—";momEl.style.color=MUTED;}
  else{momEl.textContent=(mom>=0?"▲ ":"▼ ")+Math.abs(mom).toFixed(1)+"% MoM";momEl.style.color=mom>=0?TEAL:RED;}
  document.getElementById("topMonthLabel").textContent=fmtM(sel);
  document.getElementById("barMonthLabel").textContent=fmtM(sel);
  document.getElementById("topGrossType").textContent=mx.topGross||"—";
  document.getElementById("topGrossVal").textContent=fmt(mx.topGrossVal);
  document.getElementById("topAbsType").textContent=mx.topAbsorption||"—";
  document.getElementById("topAbsVal").textContent=mx.topAbsorptionVal+"%";
  document.getElementById("topFastType").textContent=mx.fastestSell||"—";
  document.getElementById("topFastVal").textContent="Avg "+mx.fastestSellDays+" days";
  document.getElementById("btnThisMonth").textContent=fmtM(sel);
  drawTrend();
  drawBar();
  updateSummary();
  if(grossOpen)drawGrossPanel();
  if(absOpen)drawAbsPanel();
  if(openProduct)drawProductBreakdown(openProduct);
}

function updateSummary(){
  var stats=D.allTimeSummary;
  var pies=sv==="allTime"?D.allTimeSummary:D.monthlyPies[sel];
  var html="";
  Object.keys(stats).forEach(function(type){
    var s=stats[type],p=pies[type]||s;
    var uc=p.unitCounts,vc=p.valueCounts;
    var slug=type.replace(/\s/g,"-");
    var isOpen=openProduct===type;
    var cardBorder=isOpen?"border:1px solid "+TEAL+";border-radius:12px 12px 0 0;border-bottom:none;":"";
    html+="<div>";
    html+="<div class='pt-card' id='ptcard-"+slug+"' style='"+cardBorder+"'>";
    html+="<div class='pt-name'>"+type+"</div>";
    html+="<div class='stats-row'>";
    html+="<div><div class='stat-label'>Avg BUA</div><div class='stat-value'>"+s.avgBUA+" sqm</div></div>";
    html+="<div><div class='stat-label'>Avg Value</div><div class='stat-value'>"+fmt(s.avgSalesValue)+"</div></div>";
    html+="<div><div class='stat-label'>EGP/sqm</div><div class='stat-value'>EGP "+Math.round(s.avgPriceSqm).toLocaleString()+"</div></div>";
    html+="</div><div class='pie-row'>";
    html+="<div class='pie-wrap'><div class='pie-title'>Units</div><svg id='pie-u-"+slug+"' viewBox='0 0 100 100' width='100' height='100'></svg>";
    html+="<div class='legend'><span class='legend-item' style='color:"+TEAL+"'>&#9679; Sold: "+uc.sold+"</span> <span class='legend-item' style='color:"+SLATE+"'>&#9679; Hold: "+uc.hold+"</span> <span class='legend-item' style='color:"+AMBER+"'>&#9679; Available: "+uc.available+"</span></div></div>";
    html+="<div class='pie-wrap'><div class='pie-title'>Value</div><svg id='pie-v-"+slug+"' viewBox='0 0 100 100' width='100' height='100'></svg>";
    html+="<div class='legend'><span class='legend-item' style='color:"+TEAL+"'>&#9679; Sold: "+fmtS(vc.sold)+"</span> <span class='legend-item' style='color:"+SLATE+"'>&#9679; Hold: "+fmtS(vc.hold)+"</span> <span class='legend-item' style='color:"+AMBER+"'>&#9679; Available: "+fmtS(vc.available)+"</span></div></div>";
    html+="</div>";
    html+="<div style='text-align:right;font-size:9px;color:"+MUTED+";margin-top:8px;'>"+(isOpen?"▴ collapse":"▾ monthly breakdown")+"</div>";
    html+="</div>";
    if(isOpen){
      html+="<div class='pt-breakdown' id='breakdown-"+slug+"'>";
      html+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;'>";
      html+="<div style='font-size:12px;font-weight:800;color:"+TEAL+"'>"+type+" &mdash; Monthly Breakdown</div>";
      html+="<button id='close-"+slug+"' style='background:none;border:none;color:"+MUTED+";cursor:pointer;font-size:16px;'>&#10005;</button>";
      html+="</div>";
      html+="<div class='col-pair'>";
      html+="<div><div class='col-label' style='color:"+TEAL+"'>Units Sold</div><div id='chart-u-"+slug+"'></div></div>";
      html+="<div><div class='col-label' style='color:"+AMBER+"'>Revenue</div><div id='chart-r-"+slug+"'></div></div>";
      html+="</div></div>";
    }
    html+="</div>";
  });
  document.getElementById("ptGrid").innerHTML=html;

  Object.keys(stats).forEach(function(type){
    var p=pies[type]||stats[type];
    var slug=type.replace(/\s/g,"-");
    var uc=p.unitCounts,vc=p.valueCounts;
    drawPie("pie-u-"+slug,[uc.sold,uc.hold,uc.available],[TEAL,SLATE,AMBER]);
    drawPie("pie-v-"+slug,[vc.sold,vc.hold,vc.available],[TEAL,SLATE,AMBER]);
    var card=document.getElementById("ptcard-"+slug);
    if(card){
      (function(t,sl){
        card.addEventListener("click",function(){toggleProductPanel(t,sl);});
      })(type,slug);
    }
    var closeBtn=document.getElementById("close-"+slug);
    if(closeBtn){
      (function(sl){
        closeBtn.addEventListener("click",function(e){
          e.stopPropagation();
          openProduct=null;
          updateSummary();
        });
      })(slug);
    }
    if(openProduct===type){
      drawProductBreakdown(type);
    }
  });
  document.getElementById("footer").textContent="Data as of "+fmtM(D.months[D.months.length-1])+" · "+D.headerKpis.totalReleased+" released units · "+D.headerKpis.totalSold+" sold";
}

function drawProductBreakdown(type){
  var slug=type.replace(/\s/g,"-");
  var pmData=PM[type]||[];
  if(document.getElementById("chart-u-"+slug))
    drawColChart("chart-u-"+slug,pmData,function(d){return d.units;},TEAL,null);
  if(document.getElementById("chart-r-"+slug))
    drawColChart("chart-r-"+slug,pmData,function(d){return d.revenue;},AMBER,fmtS);
}

function toggleProductPanel(type){
  openProduct=openProduct===type?null:type;
  updateSummary();
  if(openProduct){
    setTimeout(function(){
      var el=document.getElementById("breakdown-"+type.replace(/\s/g,"-"));
      if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"});
    },50);
  }
}

function toggleGrossPanel(){
  grossOpen=!grossOpen;
  document.getElementById("grossPanel").style.display=grossOpen?"block":"none";
  document.getElementById("grossArrow").innerHTML=grossOpen?"VIEW ALL &#9650;":"VIEW ALL &#9660;";
  if(grossOpen)drawGrossPanel();
}
function drawGrossPanel(){
  var mx=D.byMonth[sel].metrics;
  document.getElementById("grossPanelMonth").textContent=fmtM(sel);
  var rates=Object.keys(D.allTimeSummary).map(function(type){
    var e=null;mx.barData.forEach(function(b){if(b.type===type)e=b;});
    return{type:type,revenue:e?e.revenue:0,units:e?e.units:0};
  });
  rates.sort(function(a,b){return b.revenue-a.revenue;});
  var maxR=rates[0].revenue||1;
  document.getElementById("grossBreakdown").innerHTML=rates.map(function(g){
    var isTop=g.type===mx.topGross;
    var w=g.revenue>0?Math.max(g.revenue/maxR*100,2):2;
    return "<div class='bar-row'><div class='bar-label-row'><span style='font-weight:"+(isTop?800:500)+";color:"+(isTop?AMBER:TEXT)+"'>"+(isTop?"&#127942; ":"")+g.type+"</span><span style='color:"+(isTop?AMBER:MUTED)+";font-weight:700;white-space:nowrap'>"+(g.revenue>0?fmt(g.revenue):"—")+(g.units>0?" <span style='font-size:10px;color:#64748b'>("+g.units+" units)</span>":"")+"</span></div><div class='bar-track'><div class='bar-fill' style='width:"+w+"%;background:"+(isTop?AMBER:BORDER)+"'></div></div></div>";
  }).join("");
}

function toggleAbsPanel(){
  absOpen=!absOpen;
  document.getElementById("absPanel").style.display=absOpen?"block":"none";
  document.getElementById("absArrow").innerHTML=absOpen?"VIEW ALL &#9650;":"VIEW ALL &#9660;";
  if(absOpen)drawAbsPanel();
}
function drawAbsPanel(){
  var mx=D.byMonth[sel].metrics;
  document.getElementById("absPanelMonth").textContent=fmtM(sel);
  var selIdx=D.months.indexOf(sel);
  var soldToDate={};
  D.months.slice(0,selIdx+1).forEach(function(m){
    Object.keys(D.monthlyPies[m]).forEach(function(type){
      soldToDate[type]=(soldToDate[type]||0)+D.monthlyPies[m][type].unitCounts.sold;
    });
  });
  var rates=Object.keys(D.allTimeSummary).map(function(type){
    var s=D.allTimeSummary[type];
    var released=s.unitCounts.sold+s.unitCounts.available;
    var sold=soldToDate[type]||0;
    return{type:type,rate:released>0?Math.round(sold/released*1000)/10:0,sold:sold,released:released};
  });
  rates.sort(function(a,b){return b.rate-a.rate;});
  document.getElementById("absBreakdown").innerHTML=rates.map(function(a){
    var isTop=a.type===mx.topAbsorption;
    return "<div class='bar-row'><div class='bar-label-row'><span style='font-weight:"+(isTop?800:500)+";color:"+(isTop?TEAL:TEXT)+"'>"+(isTop?"&#128142; ":"")+a.type+"</span><span style='color:"+(isTop?TEAL:MUTED)+";font-weight:700;white-space:nowrap'>"+a.rate+"% <span style='font-size:10px;color:#64748b'>("+a.sold+"/"+a.released+" units)</span></span></div><div class='bar-track'><div class='bar-fill' style='width:"+Math.max(a.rate,2)+"%;background:"+(isTop?TEAL:BORDER)+"'></div></div></div>";
  }).join("");
}

function selectMonth(m){
  sel=m;
  document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("active",t.textContent===fmtM(m));});
  if(grossOpen){grossOpen=false;document.getElementById("grossPanel").style.display="none";document.getElementById("grossArrow").innerHTML="VIEW ALL &#9660;";}
  if(absOpen){absOpen=false;document.getElementById("absPanel").style.display="none";document.getElementById("absArrow").innerHTML="VIEW ALL &#9660;";}
  updateMonthly();
}

function setSummaryView(v){
  sv=v;
  document.getElementById("btnAllTime").classList.toggle("active",v==="allTime");
  document.getElementById("btnThisMonth").classList.toggle("active",v==="thisMonth");
  updateSummary();
}

document.getElementById("grossCard").addEventListener("click",toggleGrossPanel);
document.getElementById("grossCloseBtn").addEventListener("click",toggleGrossPanel);
document.getElementById("absCard").addEventListener("click",toggleAbsPanel);
document.getElementById("absCloseBtn").addEventListener("click",toggleAbsPanel);
document.getElementById("btnAllTime").addEventListener("click",function(){setSummaryView("allTime");});
document.getElementById("btnThisMonth").addEventListener("click",function(){setSummaryView("thisMonth");});

buildKpis();
buildTabs();
updateMonthly();
</script>
</body>
</html>
